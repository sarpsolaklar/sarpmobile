<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Akıllı Sağlık Takip - Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary-container": "#974800",
                      "on-secondary": "#ffffff",
                      "secondary-container": "#9df898",
                      "surface-container-high": "#e4e9ed",
                      "on-secondary-fixed-variant": "#005312",
                      "inverse-primary": "#a9c7ff",
                      "surface-container-highest": "#dfe3e7",
                      "on-tertiary-fixed": "#311300",
                      "on-tertiary": "#ffffff",
                      "surface-dim": "#d6dade",
                      "inverse-surface": "#2c3134",
                      "tertiary-fixed-dim": "#ffb688",
                      "on-secondary-container": "#1a7425",
                      "tertiary": "#733500",
                      "on-surface-variant": "#414751",
                      "on-error": "#ffffff",
                      "on-background": "#171c1f",
                      "outline": "#717782",
                      "error-container": "#ffdad6",
                      "on-primary-fixed": "#001b3d",
                      "surface-bright": "#f6fafe",
                      "outline-variant": "#c1c7d3",
                      "on-primary-container": "#c6d9ff",
                      "primary-container": "#005db6",
                      "on-secondary-fixed": "#002204",
                      "secondary-fixed": "#9df898",
                      "on-error-container": "#93000a",
                      "surface-tint": "#005db6",
                      "surface-variant": "#dfe3e7",
                      "primary-fixed-dim": "#a9c7ff",
                      "on-tertiary-fixed-variant": "#733500",
                      "surface-container": "#eaeef2",
                      "on-tertiary-container": "#ffceb1",
                      "secondary": "#106d20",
                      "surface-container-low": "#f0f4f8",
                      "surface-container-lowest": "#ffffff",
                      "inverse-on-surface": "#edf1f5",
                      "surface": "#f6fafe",
                      "primary-fixed": "#d6e3ff",
                      "on-surface": "#171c1f",
                      "tertiary-fixed": "#ffdbc7",
                      "error": "#ba1a1a",
                      "on-primary": "#ffffff",
                      "on-primary-fixed-variant": "#00468c",
                      "background": "#f6fafe",
                      "primary": "#00468b",
                      "secondary-fixed-dim": "#82db7e"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {},
              "fontFamily": {
                      "headline": [
                              "Manrope"
                      ],
                      "body": [
                              "Inter"
                      ],
                      "label": [
                              "Inter"
                      ]
              }
      },
          },
        }
      </script>
<style>
          .material-symbols-outlined {
              font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
          }
      </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Subtle Ambient Background Gradient -->
<div class="absolute inset-0 bg-gradient-to-br from-surface-bright via-surface to-surface-container-low z-0 pointer-events-none"></div>
<!-- Abstract blurred shapes for "Clinical Sanctuary" vibe -->
<div class="absolute top-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary-fixed opacity-30 blur-3xl mix-blend-multiply pointer-events-none"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-secondary-fixed opacity-20 blur-3xl mix-blend-multiply pointer-events-none"></div>
<main class="relative z-10 flex flex-col items-center justify-center w-full px-6 max-w-md mx-auto text-center h-full">
<!-- Logo Container with Glassmorphism/Layering Effect -->
<div class="mb-10 relative">
<div class="absolute inset-0 bg-surface-container-lowest/40 backdrop-blur-2xl rounded-full scale-125 shadow-[0_12px_40px_rgba(23,28,31,0.06)] pointer-events-none"></div>
<div class="w-32 h-32 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center relative z-10 shadow-[0_8px_30px_rgba(0,70,139,0.2)] border border-outline-variant/20">
<!-- Tech Vibe Medical Heart/Cross Icon -->
<span class="material-symbols-outlined text-on-primary text-6xl" style="font-variation-settings: 'FILL' 1;">
                    monitor_heart
                </span>
</div>
</div>
<!-- App Branding -->
<div class="space-y-4">
<h1 class="font-headline font-extrabold text-4xl tracking-tight text-on-surface">
                Akıllı Sağlık Takip
            </h1>
<p class="font-body text-on-surface-variant text-base tracking-wide max-w-xs mx-auto">
                Kişisel Sağlık Asistanınız
            </p>
</div>
<!-- Loading Indicator (Subtle) -->
<div class="mt-16 w-12 h-1 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full w-1/3 animate-pulse"></div>
</div>
</main>
</body></html>
