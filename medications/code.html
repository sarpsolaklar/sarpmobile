<section>
<h1 class="font-headline text-4xl tracking-tight text-on-background font-extrabold">Today's Meds</h1>
<p class="font-body text-on-surface-variant text-lg mt-1 font-medium">Thursday, Oct 26</p>
</section>
<!-- Progress Bento Card -->
<section class="bg-surface-container-lowest rounded-3xl p-6 shadow-[0_12px_40px_rgba(23,28,31,0.06)] flex items-center justify-between">
<div>
<h2 class="font-headline text-xl font-bold text-on-surface">Daily Progress</h2>
<p class="font-body text-on-surface-variant mt-1 text-sm">3 of 5 medications taken</p>
</div>
<!-- Circular Progress -->
<div class="w-16 h-16 rounded-full border-4 border-surface-container-high flex items-center justify-center relative shadow-inner">
<svg class="w-full h-full text-secondary transform -rotate-90 absolute top-0 left-0" viewbox="0 0 36 36">
<path class="text-secondary" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-dasharray="60, 100" stroke-linecap="round" stroke-width="4"></path>
</svg>
<span class="font-headline text-sm font-extrabold text-on-surface">60%</span>
</div>
</section>
<!-- Medication List -->
<section class="flex flex-col gap-6">
<!-- Morning Group -->
<div>
<h3 class="font-headline text-lg font-bold text-on-surface mb-4 flex items-center">
                        Morning
                        <span class="text-on-surface-variant font-medium text-sm ml-3 bg-surface-container px-2 py-1 rounded-md">8:00 AM</span>
</h3>
<!-- Taken Item -->
<label class="block bg-surface-container-lowest rounded-3xl p-4 mb-4 shadow-[0_8px_30px_rgba(23,28,31,0.03)] flex items-center gap-4 cursor-pointer hover:bg-surface-bright transition-colors duration-200">
<div class="w-14 h-14 rounded-2xl bg-secondary-container text-on-secondary-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">pill</span>
</div>
<div class="flex-grow">
<h4 class="font-headline font-bold text-on-surface text-lg">Lisinopril</h4>
<p class="font-body text-on-surface-variant text-sm mt-0.5">10mg • With food</p>
</div>
<div class="relative inline-flex items-center cursor-pointer shrink-0">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-14 h-8 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-surface-dim after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-secondary"></div>
</div>

<!-- Taken Item 2 -->
<label class="block bg-surface-container-lowest rounded-3xl p-4 mb-4 shadow-[0_8px_30px_rgba(23,28,31,0.03)] flex items-center gap-4 cursor-pointer hover:bg-surface-bright transition-colors duration-200">
<div class="w-14 h-14 rounded-2xl bg-secondary-container text-on-secondary-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
<div class="flex-grow">
<h4 class="font-headline font-bold text-on-surface text-lg">Vitamin D3</h4>
<p class="font-body text-on-surface-variant text-sm mt-0.5">2000 IU • Liquid drops</p>
</div>
<div class="relative inline-flex items-center cursor-pointer shrink-0">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-14 h-8 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-surface-dim after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-secondary"></div>
</div>
</label>
</div>

<h3 class="font-headline text-lg font-bold text-on-surface mb-4 mt-2 flex items-center">
                        Afternoon

<span class="material-symbols-outlined text-[14px]">schedule</span>
                            Upcoming
                        </span>
</h3>
<!-- Pending Item (Priority/Warning styling for upcoming) -->
<label class="block bg-surface-container-lowest rounded-3xl p-4 mb-4 shadow-[0_12px_40px_rgba(115,53,0,0.08)] flex items-center gap-4 cursor-pointer hover:bg-surface-bright transition-colors duration-200 relative overflow-hidden">

</div>
<div class="flex-grow">
<h4 class="font-headline font-bold text-on-surface text-lg">Metformin</h4>
<p class="font-body text-on-surface-variant text-sm mt-0.5">500mg • After lunch</p>
</div>
<div class="relative inline-flex items-center cursor-pointer shrink-0">
<input class="sr-only peer" type="checkbox"/>
<div class="w-14 h-8 bg-surface-container-high peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-surface-dim after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-secondary shadow-inner"></div>
</div>

</div>

<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">bedtime</span>
</div>
<div class="flex-grow">
<h4 class="font-headline font-bold text-on-surface text-lg">Atorvastatin</h4>
<p class="font-body text-on-surface-variant text-sm mt-0.5">20mg • Before bed</p>
</div>
<div class="relative inline-flex items-center cursor-pointer shrink-0">
<input class="sr-only peer" type="checkbox"/>
<div class="w-14 h-8 bg-surface-container-high peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-surface-dim after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-secondary shadow-inner"></div>

<span class="material-symbols-outlined text-[26px] group-hover:-translate-y-1 transition-transform">person</span>
