name: Flutter CI

on:
  push:
    paths:
      - "smart_health_app/**"
      - ".github/workflows/flutter-ci.yml"
  pull_request:
    paths:
      - "smart_health_app/**"
      - ".github/workflows/flutter-ci.yml"

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smart_health_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
